appId: com.nikhilgems.app
productName: Nikhil Gems
copyright: Copyright © 2026 Nikhil Gems

# electron/main.cjs is the entry point
extraMetadata:
  main: electron/main.cjs

directories:
  output: release
  buildResources: build-resources

# Files to include in the packaged app.
# We only ship the electron/ folder + package.json; the web content
# loads from Vercel (APP_URL in main.cjs), so no dist/ is needed.
files:
  - electron/**/*
  - package.json
  - "!node_modules/**"
  - "!src/**"
  - "!public/**"
  - "!dist/**"
  - "!release/**"

# Rebuild native modules for Electron
npmRebuild: true

# ── Auto-update: publish to GitHub Releases ──────────────────────
publish:
  - provider: github
    owner: manavjhaveri5
    repo: nikhil-gems
    releaseType: release

# ── macOS ────────────────────────────────────────────────────────
mac:
  category: public.app-category.business
  icon: public/icon-512.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.plist
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ── Windows ──────────────────────────────────────────────────────
win:
  icon: public/icon-512.png
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Nikhil Gems

# ── Linux ────────────────────────────────────────────────────────
linux:
  icon: public/icon-512.png
  category: Office
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
